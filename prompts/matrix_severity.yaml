# `category` is the primary grouping; `denial_coded` kept for the R/L directional.
# Facts gathered via web search 2026-06-24; mostly convictions / ICC warrants /
# official findings. RE-VERIFY before publishing. {RECORD} -> documented_facts.
# ============================================================================
